name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - run: npm ci
      - run: npm --prefix frontend ci
      - run: npm run check:versions
      - run: npm run check

  build:
    needs: verify
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            package: darwin-arm64
            binary: raccoon
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            package: linux-x64
            binary: raccoon
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package: win32-x64
            binary: raccoon.exe
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm --prefix frontend ci
      - run: npm --prefix frontend run build
      - run: cargo build --locked --release --target ${{ matrix.target }}
        env:
          RACCOON_SKIP_FRONTEND_BUILD: "1"
      - run: node scripts/smoke-binary.mjs target/${{ matrix.target }}/release/${{ matrix.binary }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          if-no-files-found: error

  github-release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Package release assets
        run: |
          mkdir release
          chmod +x artifacts/darwin-arm64/raccoon artifacts/linux-x64/raccoon
          tar -C artifacts/darwin-arm64 -czf release/raccoon-node-aarch64-apple-darwin.tar.gz raccoon
          tar -C artifacts/linux-x64 -czf release/raccoon-node-x86_64-unknown-linux-gnu.tar.gz raccoon
          tar -C artifacts/win32-x64 -czf release/raccoon-node-x86_64-pc-windows-msvc.tar.gz raccoon.exe
          cd artifacts/win32-x64 && zip ../../release/raccoon-node-x86_64-pc-windows-msvc.zip raccoon.exe
          cd ../../release && sha256sum raccoon-node-* > SHA256SUMS
      - run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  npm:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Assemble platform packages
        run: |
          mkdir -p packages/raccoon-node-darwin-arm64/bin packages/raccoon-node-linux-x64/bin packages/raccoon-node-windows-x64/bin
          cp artifacts/darwin-arm64/raccoon packages/raccoon-node-darwin-arm64/bin/raccoon
          cp artifacts/linux-x64/raccoon packages/raccoon-node-linux-x64/bin/raccoon
          cp artifacts/win32-x64/raccoon.exe packages/raccoon-node-windows-x64/bin/raccoon.exe
          chmod +x packages/raccoon-node/bin/raccoon-node.js packages/raccoon-node-darwin-arm64/bin/raccoon packages/raccoon-node-linux-x64/bin/raccoon
      - name: Check npm package contents
        run: |
          npm pack ./packages/raccoon-node-darwin-arm64 --dry-run
          npm pack ./packages/raccoon-node-linux-x64 --dry-run
          npm pack ./packages/raccoon-node-windows-x64 --dry-run
          npm pack ./packages/raccoon-node --dry-run
      - name: Smoke-test npm tarballs
        run: |
          mkdir -p npm-smoke/tarballs npm-smoke/install
          npm pack ./packages/raccoon-node-linux-x64 --pack-destination npm-smoke/tarballs
          npm pack ./packages/raccoon-node --pack-destination npm-smoke/tarballs
          npm install --prefix npm-smoke/install --ignore-scripts ./npm-smoke/tarballs/raccoon-node-linux-x64-0.2.0.tgz ./npm-smoke/tarballs/raccoon-node-0.2.0.tgz
          npm-smoke/install/node_modules/.bin/raccoon --help
      - name: Publish platform packages
        run: node scripts/publish-npm.mjs packages/raccoon-node-darwin-arm64 packages/raccoon-node-linux-x64 packages/raccoon-node-windows-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish main package
        run: node scripts/publish-npm.mjs packages/raccoon-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
