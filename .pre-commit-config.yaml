fail_fast: false
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: fix-byte-order-marker
        name: 修复字节顺序标记
      - id: check-case-conflict
        name: 检查文件名大小写冲突
      - id: check-merge-conflict
        name: 检查合并冲突标记
      - id: check-symlinks
        name: 检查符号链接
      - id: check-yaml
        name: 检查 YAML 文件格式
      - id: end-of-file-fixer
        name: 修复文件末尾换行符
      - id: mixed-line-ending
        name: 修复混合行尾符
      - id: trailing-whitespace
        name: 删除行尾多余空格

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        name: 使用 Black 格式化 Python 代码

  - repo: https://github.com/crate-ci/typos
    rev: v1.47.0
    hooks:
      - id: typos
        name: 检查拼写错误

